# /usr/local/etc/dnsforce/dnsforce.pf.conf
#
# Standalone PF main ruleset, loaded by our LaunchDaemon via
#   pfctl -E -f /usr/local/etc/dnsforce/dnsforce.pf.conf
#
# This file replaces the role of /etc/pf.conf for our purposes so we
# don't have to modify any system files. It mirrors the system's
# default anchor declarations (so Apple services that register
# anchors at runtime — AirDrop, screen sharing, content filters,
# etc. — keep working) and adds our own anchor on top.

# ============================================================
#  Apple's default anchor declarations
#  (mirroring stock /etc/pf.conf so Apple services keep working)
# ============================================================
scrub-anchor "com.apple/*"
nat-anchor "com.apple/*"
rdr-anchor "com.apple/*"
dummynet-anchor "com.apple/*"
anchor "com.apple/*"
load anchor "com.apple" from "/etc/pf.anchors/com.apple"

# ============================================================
#  Our anchor
# ============================================================
anchor "com.selfexclusion.dnsforce"
load anchor "com.selfexclusion.dnsforce" from "/usr/local/etc/dnsforce/com.selfexclusion.dnsforce"
